<script>
  // 환경설정 시트에서 읽어온 값 (Index.html의 APP_CONFIG 스크립틀릿에서 주입됨)
  var MIC_PAGE_URL    = APP_CONFIG.MIC_PAGE_URL;
  var MIC_PAGE_ORIGIN = APP_CONFIG.MIC_PAGE_ORIGIN;

  var selectedCount = 10;
  var selectedMode  = 'SCORE'; // 'SCORE' | 'TIME'
  var selectedStudent = null;  // { id, name }
  var quizData    = null;      // { quiz: [...] }
  var lastResult  = null;      // 팝업에서 받은 최종 채점 결과
  var popupRef    = null;

  function showView(id){
    document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function showError(msg){
    var box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.add('show');
  }
  function clearError(){
    document.getElementById('error-box').classList.remove('show');
  }

  /* ---------- ① 학생 선택/설정 화면 ---------- */

  var fullStudentList = [];

  google.script.run.withSuccessHandler(function(list){
    fullStudentList = list;
    var grades = [];
    list.forEach(function(s){ if (s.grade && grades.indexOf(s.grade) === -1) grades.push(s.grade); });
    grades.sort();
    var gradeSelect = document.getElementById('select-grade');
    grades.forEach(function(g){
      var opt = document.createElement('option');
      opt.value = g; opt.textContent = g + '학년';
      gradeSelect.appendChild(opt);
    });
  }).withFailureHandler(function(err){
    showError('학생 명단을 불러오지 못했습니다: ' + err.message);
  }).getStudentList();

  document.getElementById('select-grade').addEventListener('change', function(){
    var grade = this.value;
    var classSelect = document.getElementById('select-class');
    var studentSelect = document.getElementById('select-student');

    classSelect.innerHTML = '';
    studentSelect.innerHTML = '<option value="">-- 먼저 반을 선택하세요 --</option>';
    studentSelect.disabled = true;
    selectedStudent = null;

    if (!grade) {
      classSelect.innerHTML = '<option value="">-- 먼저 학년을 선택하세요 --</option>';
      classSelect.disabled = true;
      return;
    }

    var classes = [];
    fullStudentList.forEach(function(s){
      if (s.grade === grade && classes.indexOf(s.classNo) === -1) classes.push(s.classNo);
    });
    classes.sort();
    classSelect.innerHTML = '<option value="">-- 반 선택 --</option>';
    classes.forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c; opt.textContent = c + '반';
      classSelect.appendChild(opt);
    });
    classSelect.disabled = false;
  });

  document.getElementById('select-class').addEventListener('change', function(){
    var grade = document.getElementById('select-grade').value;
    var classNo = this.value;
    var studentSelect = document.getElementById('select-student');

    studentSelect.innerHTML = '<option value="">-- 이름 선택 --</option>';
    selectedStudent = null;

    if (!classNo) {
      studentSelect.innerHTML = '<option value="">-- 먼저 반을 선택하세요 --</option>';
      studentSelect.disabled = true;
      return;
    }

    var matched = fullStudentList.filter(function(s){ return s.grade === grade && s.classNo === classNo; });
    matched.sort(function(a, b){ return a.id.localeCompare(b.id); });
    matched.forEach(function(s){
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name + ' (' + s.id + ')';
      opt.dataset.name = s.name;
      studentSelect.appendChild(opt);
    });
    studentSelect.disabled = false;
  });

  document.getElementById('select-student').addEventListener('change', function(){
    var opt = this.options[this.selectedIndex];
    selectedStudent = opt.value ? { id: opt.value, name: opt.dataset.name } : null;
  });

  var MODE_DESC = {
    SCORE: '문항마다 제한시간 안에 맞히면 정답, 못 맞히면 오답으로 채점합니다.',
    TIME: '제한시간 없이, 맞힐 때까지 계속 시도합니다. 전체 문항을 끝내는 데 걸린 총 시간을 기록합니다.'
  };

  document.querySelectorAll('#mode-row .chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      document.querySelectorAll('#mode-row .chip').forEach(function(c){ c.classList.remove('selected'); });
      chip.classList.add('selected');
      selectedMode = chip.dataset.mode;
      document.getElementById('mode-desc').textContent = MODE_DESC[selectedMode];
    });
  });

  document.querySelectorAll('#chip-row .chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      document.querySelectorAll('#chip-row .chip').forEach(function(c){ c.classList.remove('selected'); });
      chip.classList.add('selected');
      selectedCount = Number(chip.dataset.count); // 0 = 전체
    });
  });

  document.getElementById('btn-start').addEventListener('click', function(){
    clearError();
    if (!selectedStudent) { showError('명단에서 본인 이름을 선택해주세요.'); return; }

    var btn = this;
    btn.disabled = true;
    btn.textContent = '문항 준비 중...';

    google.script.run
      .withSuccessHandler(function(res){
        btn.disabled = false;
        btn.textContent = '이 정보로 평가 준비하기';
        if (!res.success) { showError(res.message || '문항을 불러오지 못했습니다.'); return; }
        quizData = res;
        showView('view-waiting');
      })
      .withFailureHandler(function(err){
        btn.disabled = false;
        btn.textContent = '이 정보로 평가 준비하기';
        showError('서버 오류가 발생했습니다: ' + err.message);
      })
      .getQuiz(selectedCount || 999);
  });

  /* ---------- ② 대기 화면 → 팝업 오픈 ---------- */

  function openMicPopup(){
    if (!MIC_PAGE_URL || !MIC_PAGE_ORIGIN) {
      showError('환경설정 탭에 MIC_PAGE_URL / MIC_PAGE_ORIGIN 값이 없습니다. 시트를 확인해주세요.');
      return;
    }
    // 팝업 차단 방지: 반드시 click 핸들러 내부에서 동기적으로 호출
    popupRef = window.open(MIC_PAGE_URL, 'micQuiz', 'width=480,height=840');
    if (!popupRef) {
      document.getElementById('btn-reopen').style.display = 'block';
      showError('팝업이 차단되었습니다. 브라우저의 팝업 차단을 해제하고 다시 시도해주세요.');
      return;
    }
    document.getElementById('waiting-text').textContent = '팝업 창에서 마이크 권한을 허용해주세요...';
    document.getElementById('btn-open-popup').style.display = 'none';
    document.getElementById('btn-reopen').style.display = 'block';
  }

  document.getElementById('btn-open-popup').addEventListener('click', openMicPopup);
  document.getElementById('btn-reopen').addEventListener('click', openMicPopup);

  /* ---------- 팝업과의 postMessage 통신 ---------- */

  window.addEventListener('message', function(evt){
    if (evt.origin !== MIC_PAGE_ORIGIN) return; // 다른 출처 메시지는 무시 (보안)
    var data = evt.data || {};

    if (data.type === 'READY') {
      popupRef.postMessage({
        type: 'INIT',
        quiz: quizData.quiz,
        student: selectedStudent,
        mode: selectedMode
      }, MIC_PAGE_ORIGIN);
      document.getElementById('waiting-text').textContent = '평가가 진행 중입니다. 팝업 창을 확인해주세요.';
    }

    if (data.type === 'DONE') {
      lastResult = data.result; // { mode, correctCount?, totalCount, wrongQuestions?, elapsedSeconds? }
      if (popupRef) popupRef.close();
      submitFinalResult();
    }
  });

  function submitFinalResult(){
    var payload = Object.assign({}, lastResult, {
      studentId: selectedStudent.id,
      studentName: selectedStudent.name
    });

    google.script.run
      .withSuccessHandler(function(res){
        if (!res.success) { showError(res.message || '기록 저장에 실패했습니다.'); return; }
        renderResult(res, lastResult);
        showView('view-result');
      })
      .withFailureHandler(function(err){
        showError('결과 저장 중 오류: ' + err.message);
      })
      .submitResult(payload);
  }

  /* ---------- ③ 결과 화면 ---------- */

  function renderResult(res, result){
    var isTime = res.mode === 'TIME';
    document.getElementById('score-hero-score').style.display = isTime ? 'none' : 'block';
    document.getElementById('score-hero-time').style.display = isTime ? 'block' : 'none';
    document.getElementById('stat-row-score').style.display = isTime ? 'none' : 'flex';
    document.getElementById('wrong-box').style.display = 'none';

    if (isTime) {
      var m = Math.floor(res.elapsedSeconds / 60);
      var s = res.elapsedSeconds % 60;
      document.getElementById('time-num').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      return;
    }

    document.getElementById('score-num').textContent = res.score;
    document.getElementById('stat-correct').textContent = res.correct;
    document.getElementById('stat-wrong').textContent = res.total - res.correct;
    document.getElementById('stat-total').textContent = res.total;

    var wrongBox = document.getElementById('wrong-box');
    var wrongTags = document.getElementById('wrong-tags');
    wrongTags.innerHTML = '';
    if (result.wrongQuestions && result.wrongQuestions.length) {
      wrongBox.style.display = 'block';
      result.wrongQuestions.forEach(function(q){
        var span = document.createElement('span');
        span.className = 'tag';
        span.textContent = q;
        wrongTags.appendChild(span);
      });
    }
  }

  document.getElementById('btn-restart').addEventListener('click', function(){
    location.reload();
  });
</script>
